<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>bodega</title>
<style>
:root, [data-theme="dark"] {
  --bg: #1a1b26;
  --bg-panel: #1f2133;
  --border: #33364a;
  --fg: #c0caf5;
  --fg-dim: #565f89;
  --accent: #7aa2f7;
  --green: #9ece6a;
  --red: #f7768e;
  --yellow: #e0af68;
  --cyan: #7dcfff;
  --purple: #bb9af7;
  --font: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace;
}
[data-theme="light"] {
  --bg: #f5f5f5;
  --bg-panel: #ffffff;
  --border: #d0d0d0;
  --fg: #1a1a2e;
  --fg-dim: #6b7280;
  --accent: #2563eb;
  --green: #16a34a;
  --red: #dc2626;
  --yellow: #d97706;
  --cyan: #0891b2;
  --purple: #7c3aed;
}
@media (prefers-color-scheme: light) {
  [data-theme="auto"] {
    --bg: #f5f5f5;
    --bg-panel: #ffffff;
    --border: #d0d0d0;
    --fg: #1a1a2e;
    --fg-dim: #6b7280;
    --accent: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --yellow: #d97706;
    --cyan: #0891b2;
    --purple: #7c3aed;
  }
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg);
  color: var(--fg);
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Layout */
.tree-panel {
  width: 300px;
  min-width: 200px;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
  flex-shrink: 0;
}
.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
}

/* Header */
.header {
  padding: 8px 16px 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
  color: var(--accent);
  font-weight: bold;
  font-size: 15px;
  letter-spacing: 0.5px;
}
.header span { color: var(--fg-dim); font-weight: normal; font-size: 12px; }

/* Filter */
.filter-bar {
  padding: 4px 12px 8px;
}
.filter-bar input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg);
  font-family: var(--font);
  font-size: 12px;
  padding: 4px 8px;
  outline: none;
}
.filter-bar input:focus { border-color: var(--accent); }
.tree-actions {
  display: flex;
  gap: 4px;
  padding: 0 12px 6px;
}
.tree-action-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--fg-dim);
  font-family: var(--font);
  font-size: 11px;
  padding: 2px 8px;
  cursor: pointer;
}
.tree-action-btn:hover { color: var(--accent); border-color: var(--accent); }

/* Tree */
.group {
  user-select: none;
}
.group-header {
  padding: 3px 12px;
  cursor: pointer;
  font-weight: bold;
  color: var(--fg-dim);
  display: flex;
  align-items: center;
  gap: 6px;
}
.group-header:hover { background: var(--bg-panel); }
.group-header .icon { width: 14px; text-align: center; }
.group-header .arrow { width: 10px; font-size: 10px; }
.group-header .count { color: var(--fg-dim); font-weight: normal; font-size: 11px; }

.entry {
  padding: 2px 12px 2px 32px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 6px;
}
.entry:hover { background: var(--bg-panel); }
.entry.selected { background: var(--accent); color: var(--bg); }
.entry .status { width: 10px; font-size: 11px; }
.entry .status.s3 { color: var(--green); }
.entry .status.no-s3 { color: var(--red); }
.entry .status.frozen { color: var(--yellow); }

/* Detail */
.detail-empty {
  color: var(--fg-dim);
  padding-top: 40px;
  text-align: center;
}
.detail-title {
  color: var(--accent);
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.detail-title .type-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--fg-dim);
  font-weight: normal;
}
.field {
  display: flex;
  padding: 3px 0;
  gap: 12px;
}
.field .key {
  color: var(--accent);
  min-width: 120px;
  flex-shrink: 0;
  text-align: right;
}
.field .val { word-break: break-all; }
.field .val.yes { color: var(--green); }
.field .val.no { color: var(--fg-dim); }
.field .val.uploaded { color: var(--green); }
.field .val.not-s3 { color: var(--red); }
.field .val.url { color: var(--cyan); }

.json-section {
  margin-top: 20px;
  border-top: 1px solid var(--border);
  padding-top: 12px;
}
.json-section h3 {
  color: var(--fg-dim);
  font-size: 12px;
  font-weight: normal;
  margin-bottom: 8px;
}
.json-section pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  font-size: 12px;
  overflow-x: auto;
  color: var(--fg-dim);
  text-align: left;
  white-space: pre;
}

/* Theme toggle */
.theme-toggle {
  position: fixed;
  top: 8px;
  right: 12px;
  display: flex;
  gap: 4px;
  z-index: 10;
}
.theme-btn {
  background: var(--bg-panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--fg-dim);
  cursor: pointer;
  font-size: 14px;
  padding: 3px 6px;
  line-height: 1;
}
.theme-btn:hover { color: var(--accent); border-color: var(--accent); }
.theme-btn.active { color: var(--accent); border-color: var(--accent); background: var(--bg); }

/* Copy link button */
.copy-link {
  cursor: pointer;
  color: var(--fg-dim);
  font-size: 14px;
  padding: 2px 4px;
  border-radius: 3px;
  text-decoration: none;
  margin-left: 4px;
}
.copy-link:hover { color: var(--accent); background: var(--bg); }
.copy-link.copied { color: var(--green); }

/* Dashboard */
.dash-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.dash-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  text-align: center;
}
.dash-card .value {
  font-size: 24px;
  font-weight: bold;
  color: var(--accent);
}
.dash-card .label {
  font-size: 11px;
  color: var(--fg-dim);
  margin-top: 4px;
}
.dash-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.dash-bar-label { width: 60px; text-align: right; color: var(--fg-dim); font-size: 12px; }
.dash-bar-track {
  flex: 1;
  height: 16px;
  background: var(--bg);
  border-radius: 3px;
  overflow: hidden;
}
.dash-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}
.dash-bar-count { width: 30px; font-size: 12px; color: var(--fg-dim); }
.dash-section { margin-top: 16px; }
.dash-section h3 { color: var(--fg-dim); font-size: 12px; margin-bottom: 8px; }

/* Type colors */
.type-apt { color: #ffaf00; }
.type-git { color: #8787ff; }
.type-pypi { color: #b8860b; }
.type-binary { color: #00d787; }
.type-gomod { color: #5fd7ff; }
.type-helm { color: #0087ff; }
.type-npm { color: #ff005f; }
</style>
</head>
<body>

<div class="theme-toggle">
  <button class="theme-btn" onclick="setTheme('light')" title="Light">&#9788;</button>
  <button class="theme-btn" onclick="setTheme('dark')" title="Dark">&#9790;</button>
  <button class="theme-btn" onclick="setTheme('auto')" title="Auto">&#9881;</button>
</div>

<div class="tree-panel">
  <div class="header"><a href="#" onclick="showDashboard(); return false;" style="color:inherit;text-decoration:none">bodega</a> <span id="status-text"></span></div>
  <div class="filter-bar"><input type="text" id="filter" placeholder="/ filter..."></div>
  <div class="tree-actions">
    <button class="tree-action-btn" onclick="expandAll()" title="Expand all">&#9660; all</button>
    <button class="tree-action-btn" onclick="collapseAll()" title="Collapse all">&#9654; all</button>
  </div>
  <div id="tree"></div>
</div>

<div class="detail-panel">
  <div id="detail" class="detail-empty">Loading...</div>
</div>

<script>
const typeIcons = {apt:'A', git:'G', pypi:'P', binary:'B', gomod:'M', helm:'H', npm:'N'};
const typeOrder = ['apt','git','pypi','binary','gomod','helm','npm'];
let allData = null;
let selectedKey = null;
let expandedGroups = new Set();
let expandedPkgs = new Set();
let savedExpandedGroups = null;
let savedExpandedPkgs = null;
let wasFiltering = false;

async function load() {
  try {
    const [pkgRes, statusRes] = await Promise.all([
      fetch('/api/v1/packages'),
      fetch('/api/v1/status')
    ]);
    allData = await pkgRes.json();
    const status = await statusRes.json();
    document.getElementById('status-text').textContent =
      Object.values(status.entry_count || {}).reduce((a,b) => a+b, 0) + ' packages';
  } catch(e) {
    document.getElementById('status-text').textContent = 'error loading';
  }
  render();
}

function entriesForType(type) {
  if (!allData) return [];
  var manifests = allData[type] || [];
  // Flatten PackageManifests into individual version entries.
  // Each entry gets the package name from the manifest and version fields from the VersionEntry.
  var entries = [];
  for (var pm of manifests) {
    if (!pm.versions || pm.versions.length === 0) {
      // Package with no versions -- show as a placeholder.
      entries.push(Object.assign({name: pm.name, description: pm.description}, {}));
      continue;
    }
    for (var ve of pm.versions) {
      entries.push(Object.assign({name: pm.name, description: pm.description}, ve));
    }
  }
  return entries;
}

function entryVersion(type, e) {
  if (type === 'git') return e.ref || '';
  return e.version || '';
}

function entryDisplayName(type, e) {
  const v = entryVersion(type, e);
  return v ? e.name + '@' + v : e.name;
}

// Group entries by name for three-level tree.
function groupByName(pkgType, entries) {
  var order = [];
  var byName = {};
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i];
    if (!byName[e.name]) { order.push(e.name); byName[e.name] = []; }
    byName[e.name].push(e);
  }
  return { order: order, map: byName };
}

function render() {
  const filter = document.getElementById('filter').value.toLowerCase();
  const isFiltering = filter.length > 0;
  const tree = document.getElementById('tree');
  tree.innerHTML = '';

  // Save expand state when entering filter mode, restore when leaving.
  if (isFiltering && !wasFiltering) {
    savedExpandedGroups = new Set(expandedGroups);
    savedExpandedPkgs = new Set(expandedPkgs);
  } else if (!isFiltering && wasFiltering && savedExpandedGroups) {
    expandedGroups = savedExpandedGroups;
    expandedPkgs = savedExpandedPkgs;
    savedExpandedGroups = null;
    savedExpandedPkgs = null;
  }
  wasFiltering = isFiltering;

  for (const type of typeOrder) {
    let entries = entriesForType(type);
    if (filter) {
      entries = entries.filter(e => entryDisplayName(type, e).toLowerCase().includes(filter));
    }

    // When filtering, auto-expand groups that have matches.
    if (isFiltering && entries.length > 0) {
      expandedGroups.add(type);
      const { order } = groupByName(type, entries);
      for (const name of order) expandedPkgs.add(type + '/' + name);
    }

    const group = document.createElement('div');
    group.className = 'group';

    const header = document.createElement('div');
    header.className = 'group-header';
    const expanded = expandedGroups.has(type);
    header.innerHTML =
      '<span class="arrow">' + (expanded ? '\u25BC' : '\u25B6') + '</span>' +
      '<span class="icon type-' + type + '">' + typeIcons[type] + '</span>' +
      '<span>' + type + '/</span>' +
      '<span class="count">(' + entries.length + ')</span>';
    header.onclick = () => {
      if (expandedGroups.has(type)) expandedGroups.delete(type);
      else expandedGroups.add(type);
      selectedKey = null;
      render();
      showTypeMetrics(type);
    };
    group.appendChild(header);

    if (expanded) {
      const { order, map } = groupByName(type, entries);
      for (const name of order) {
        const versions = map[name];
        const pkgKey = type + '/' + name;
        const pkgExpanded = expandedPkgs.has(pkgKey);
        const pkgHeader = document.createElement('div');
        pkgHeader.className = 'group-header';
        pkgHeader.style.paddingLeft = '24px';
        pkgHeader.innerHTML =
          '<span class="arrow">' + (pkgExpanded ? '\u25BC' : '\u25B6') + '</span>' +
          '<span>' + escapeHtml(name) + '</span>' +
          '<span class="count">(' + versions.length + ')</span>';
        pkgHeader.onclick = () => {
          if (expandedPkgs.has(pkgKey)) expandedPkgs.delete(pkgKey);
          else expandedPkgs.add(pkgKey);
          render();
        };
        group.appendChild(pkgHeader);
        if (pkgExpanded) {
          for (const e of versions) {
            const row = document.createElement('div');
            const key = type + '/' + e.name + '/' + entryVersion(type, e);
            row.className = 'entry' + (selectedKey === key ? ' selected' : '');
            row.style.paddingLeft = '48px';
            row.innerHTML =
              '<span class="status ' + (e.frozen ? 'frozen' : '') + '">' +
              (e.frozen ? '*' : '') + '</span>' +
              (entryVersion(type, e) === '*'
                ? '<span style="color:var(--fg-dim)">' + escapeHtml(e.name) + '@*</span>'
                : '<span>' + escapeHtml(entryVersion(type, e) || e.name) + '</span>');
            row.onclick = () => { selectedKey = key; render(); showDetail(type, e); };
            group.appendChild(row);
          }
        }
      }
    }
    tree.appendChild(group);
  }
}

function showDetail(type, entry) {
  const d = document.getElementById('detail');
  const ver = entryVersion(type, entry);
  location.hash = encodeURIComponent(type + '/' + entry.name + (ver ? '/' + ver : ''));
  const clientUrl = getClientUrl(type, entry);
  const permalink = location.origin + '/#' + encodeURIComponent(type + '/' + entry.name + (ver ? '/' + ver : ''));
  let html = '<div class="detail-title">' +
    '<span class="type-badge">' + escapeHtml(type) + '</span> ' +
    escapeHtml(entry.name) +
    ' <span class="copy-link" title="Copy link to this package" data-url="' +
    escapeHtml(permalink) + '">\u{1F517}</span>' +
    '</div>';

  const isPolicyEntry = entry.version === '*';

  const fields = [];
  if (type === 'git') {
    fields.push(['Ref', entry.ref]);
    fields.push(['Source URL', entry.url, 'url']);
    if (entry.source) fields.push(['Source', entry.source]);
  } else if (type === 'pypi') {
    if (entry.version) fields.push(['Version', entry.version]);
    if (entry.required_by && entry.required_by.length)
      fields.push(['Required by', entry.required_by.join(', ')]);
    if (entry.mode) fields.push(['Mode', entry.mode]);
  } else {
    if (entry.version) fields.push(['Version', entry.version]);
    if (entry.url && !isPolicyEntry) fields.push(['Source URL', entry.url, 'url']);
    if (entry.mode) fields.push(['Mode', entry.mode]);
  }

  // Show apt-specific fields for policy entries.
  if (isPolicyEntry) {
    if (entry.source_name) fields.push(['Package Name', entry.source_name]);
    // Look up dep_policy from the manifest.
    var manifests = allData[type] || [];
    for (var pm of manifests) {
      if (pm.name === entry.name && pm.dep_policy) {
        fields.push(['Dep Policy', pm.dep_policy]);
        break;
      }
    }
  }

  if (entry.checksum) {
    fields.push(['Checksum', entry.checksum.algorithm + ':' + entry.checksum.value]);
    fields.push(['Verified', entry.checksum_verified ? 'yes' : 'no',
      entry.checksum_verified ? 'yes' : 'no']);
  }
  if (entry.version_constraint)
    fields.push(['Constraint', entry.version_constraint]);
  fields.push(['Frozen', entry.frozen ? 'yes' : 'no', entry.frozen ? 'yes' : 'no']);
  if (clientUrl && !isPolicyEntry) fields.push(['Package URL', clientUrl, 'url']);

  // Render metadata map if present, with a section header.
  if (entry.metadata && typeof entry.metadata === 'object') {
    fields.push(['__section__', 'Apt Metadata']);
    for (const [mk, mv] of Object.entries(entry.metadata)) {
      if (mk !== 'Description-Full') {
        fields.push([mk, mv]);
      }
    }
  }

  for (const [k, v, cls] of fields) {
    // Section headers.
    if (k === '__section__') {
      html += '<div style="margin-top:12px;margin-bottom:4px;color:var(--fg);font-size:12px;font-weight:bold;text-align:left">' + escapeHtml(v) + '</div>';
      continue;
    }
    var valHtml = escapeHtml(v || '');
    if (cls === 'url' && v && v.startsWith('http')) {
      valHtml = '<a href="' + escapeHtml(v) + '" target="_blank" style="color:var(--cyan)">' + escapeHtml(v) + '</a>';
    }
    var copyIcon = '';
    if (cls === 'url' && v) {
      copyIcon = ' <span class="copy-link" title="Copy ' + escapeHtml(k) + '" data-url="' + escapeHtml(v).replace(/"/g,'&quot;') + '">\u{1F517}</span>';
    }
    html += '<div class="field"><span class="key">' + escapeHtml(k) + ':</span>' +
      '<span class="val' + (cls ? ' ' + cls : '') + '">' + valHtml + '</span>' + copyIcon + '</div>';
  }

  html += '<div class="json-section"><h3>Package JSON Config ' +
    '<span class="copy-link copy-json" title="Copy JSON">\u{1F517}</span>' +
    '</h3><pre class="json-pre">Loading...</pre></div>';

  d.innerHTML = html;

  // Fetch the PackageManifest for JSON display. When a specific version is
  // selected, fetch the version-scoped endpoint — the response is still a
  // valid PackageManifest (config_version, name, type, description, plus a
  // single-entry versions array), so it's copy-paste ready for re-import.
  // Package-header selection (no version) keeps the full-manifest fetch.
  var url = '/api/v1/packages/' + type + '/' + encodeURIComponent(entry.name);
  var scopedVer = entryVersion(type, entry);
  if (scopedVer && scopedVer !== '*') {
    url += '/' + encodeURIComponent(scopedVer);
  }
  fetch(url)
    .then(function(r) { return r.ok ? r.json() : entry; })
    .catch(function() { return entry; })
    .then(function(manifest) {
      var jsonStr = JSON.stringify(manifest, null, 2);
      var pre = d.querySelector('.json-pre');
      if (pre) pre.textContent = jsonStr;
      var jsonCopyEl = d.querySelector('.copy-json');
      if (jsonCopyEl) jsonCopyEl._jsonData = jsonStr;
    });
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getClientUrl(type, entry) {
  const host = location.host;
  const proto = location.protocol;
  switch (type) {
    case 'git': {
      const ext = entry.source === 'clone' ? '.bundle' : '.tar.gz';
      const ref = entry.ref || '';
      const sn = entry.name.replace(/\//g, '--');
      return proto + '//' + host + '/git/' + sn + '/' + sn + '-' + ref + ext;
    }
    case 'binary': {
      const fn = entry.filename || (entry.url ? entry.url.split('/').pop() : entry.name);
      if (entry.version) return proto + '//' + host + '/binaries/' + entry.name + '/' + entry.version + '/' + fn;
      return proto + '//' + host + '/binaries/' + entry.name + '/' + fn;
    }
    case 'apt':
      return 'deb [trusted=yes] ' + proto + '//' + host + '/apt/ noble main';
    case 'pypi':
      return 'pip install --index-url ' + proto + '//' + host + '/pypi/simple/ ' + entry.name;
    case 'gomod':
      return 'GOPROXY=' + proto + '//' + host + '/go,direct go get ' + entry.name;
    case 'helm':
      return proto + '//' + host + '/helm/charts/' + entry.name + '-' + (entry.version || '') + '.tgz';
    case 'npm':
      return 'npm install --registry ' + proto + '//' + host + '/npm/ ' + entry.name;
  }
  return '';
}

async function showDashboard() {
  selectedKey = null;
  render();
  var d = document.getElementById('detail');
  d.innerHTML = '<div class="detail-title">Dashboard</div><div class="detail-empty">Loading metrics...</div>';

  try {
    var resp = await fetch('/api/v1/metrics');
    var m = resp.ok ? await resp.json() : null;
    if (!m) { d.innerHTML = '<div class="detail-empty">Could not load metrics.</div>'; return; }

    var g = m.global;

    var html = '<div class="detail-title">Dashboard</div>';
    html += '<div class="dash-cards">';
    html += dashCard(g.packages, 'Packages');
    html += dashCard(g.versions, 'Versions');
    if (g.storage_bytes > 0) html += dashCard(humanBytes(g.storage_bytes), 'Storage');
    html += dashCard(g.frozen, 'Frozen');
    html += dashCard(g.hidden, 'Hidden');
    html += dashCard(g.dep_edges, 'Dependencies');
    html += dashCard(g.orphans, 'Orphans');
    html += '</div>';
    if (m.updated_at) {
      html += '<div style="color:var(--fg-dim);font-size:11px;margin-bottom:12px">Updated: ' + m.updated_at + '</div>';
    }

    // Per-type bar chart.
    html += '<div class="dash-section"><h3>Packages by Type</h3>';
    var maxPkg = 0;
    for (var t in m.by_type) { if (m.by_type[t].packages > maxPkg) maxPkg = m.by_type[t].packages; }
    var barColors = {apt:'#ffaf00', git:'#8787ff', pypi:'#b8860b', binary:'#00d787', gomod:'#5fd7ff', helm:'#0087ff', npm:'#ff005f'};
    for (var t of typeOrder) {
      var bt = m.by_type[t] || {packages:0};
      var w = maxPkg > 0 ? Math.round(bt.packages * 100 / maxPkg) : 0;
      html += '<div class="dash-bar-row">';
      html += '<span class="dash-bar-label">' + t + '</span>';
      html += '<div class="dash-bar-track"><div class="dash-bar-fill" style="width:' + w + '%;background:' + (barColors[t]||'var(--accent)') + '"></div></div>';
      html += '<span class="dash-bar-count">' + bt.packages + '</span>';
      html += '</div>';
    }
    html += '</div>';

    d.innerHTML = html;
  } catch(e) {
    d.innerHTML = '<div class="detail-empty">Error loading metrics.</div>';
  }
}

async function showTypeMetrics(type) {
  var d = document.getElementById('detail');
  var entries = entriesForType(type);
  var html = '<div class="detail-title"><span class="type-badge">' + type + '</span> Repository</div>';

  // Summary cards.
  var versions = 0, frozen = 0, hidden = 0;
  for (var e of entries) {
    versions++;
    if (e.frozen) frozen++;
    if (e.hidden) hidden++;
  }

  var { order } = groupByName(type, entries);

  // Try to get storage from cached metrics.
  var storageLabel = '';
  try {
    var mResp = await fetch('/api/v1/metrics');
    if (mResp.ok) {
      var metrics = await mResp.json();
      var tm = metrics.by_type[type];
      if (tm && tm.storage_bytes > 0) {
        storageLabel = humanBytes(tm.storage_bytes);
      }
    }
  } catch(e) {}

  html += '<div class="dash-cards">';
  html += dashCard(order.length, 'Packages');
  html += dashCard(versions, 'Versions');
  if (storageLabel) html += dashCard(storageLabel, 'Storage');
  html += dashCard(frozen, 'Frozen');
  html += dashCard(hidden, 'Hidden');
  html += '</div>';

  d.innerHTML = html;
}

function humanBytes(b) {
  if (b >= 1073741824) return (b / 1073741824).toFixed(1) + ' GiB';
  if (b >= 1048576) return (b / 1048576).toFixed(1) + ' MiB';
  if (b >= 1024) return (b / 1024).toFixed(1) + ' KiB';
  return b + ' B';
}

function dashCard(value, label) {
  return '<div class="dash-card"><div class="value">' + value + '</div><div class="label">' + label + '</div></div>';
}

function expandAll() {
  for (var t of typeOrder) expandedGroups.add(t);
  if (!allData) { render(); return; }
  for (var t of typeOrder) {
    var entries = entriesForType(t);
    var g = groupByName(t, entries);
    for (var n of g.order) expandedPkgs.add(t + '/' + n);
  }
  render();
}

function collapseAll() {
  expandedGroups.clear();
  expandedPkgs.clear();
  render();
}

// Delegated click handler for copy-link spans.
document.addEventListener('click', function(e) {
  var el = e.target.closest('.copy-link');
  if (!el) return;
  e.preventDefault();
  e.stopPropagation();
  var text = el._jsonData || el.getAttribute('data-url');
  if (!text) return;
  function onCopied() {
    el.classList.add('copied');
    var origTitle = el.title;
    el.title = 'Copied!';
    setTimeout(function() { el.classList.remove('copied'); el.title = origTitle; }, 1500);
  }
  function fallbackCopy() {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    onCopied();
  }
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onCopied).catch(fallbackCopy);
  } else {
    fallbackCopy();
  }
});

function setTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('bodega-theme', theme);
  document.querySelectorAll('.theme-btn').forEach((btn, i) => {
    const themes = ['light', 'dark', 'auto'];
    btn.classList.toggle('active', themes[i] === theme);
  });
}

// Restore saved theme or default to auto.
(function() {
  const saved = localStorage.getItem('bodega-theme') || 'auto';
  setTheme(saved);
})();

document.getElementById('filter').addEventListener('input', render);

async function init() {
  await load();
  // Show dashboard by default, or navigate to hash permalink.
  if (!location.hash) {
    showDashboard();
  } else if (location.hash) {
    var path = decodeURIComponent(location.hash.slice(1));
    var parts = path.split('/');
    if (parts.length >= 2 && allData) {
      var type = parts[0];
      var name = parts.slice(1, -1).join('/') || parts[1];
      var ver = parts.length > 2 ? parts[parts.length - 1] : '';
      expandedGroups.add(type);
      expandedPkgs.add(type + '/' + name);
      var entries = entriesForType(type);
      for (var e of entries) {
        if (e.name === name) {
          selectedKey = type + '/' + e.name + '/' + entryVersion(type, e);
          render();
          showDetail(type, e);
          break;
        }
      }
    }
  }
}
init();
</script>
