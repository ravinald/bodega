# golangci-lint v2 configuration for bodega.
version: "2"

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - gosec
    - staticcheck
    - unused
  settings:
    errcheck:
      # Conventional ignores. Checking these errors rarely yields actionable
      # signal and adding `_ = ...` everywhere is noise.
      exclude-functions:
        # Stream / handle close at end-of-scope (deferred or otherwise).
        - (io.Closer).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*os.File).Close
        - (*net/http.Response).Body.Close
        # Project-specific: audit.DB.Close — defer-close pattern across every
        # CLI subcommand. Underlying SQL handle close errors are non-actionable.
        - (*github.com/ravinald/bodega/internal/audit.DB).Close
        # Writes to stdout / stderr where a closed pipe is the only failure.
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        # Best-effort cleanup paths.
        - os.Remove
        - os.RemoveAll
    staticcheck:
      # Match golangci-lint v2's default exclusions (ST1000-series style
      # suggestions are too noisy as gates), plus disable QF1001 (De Morgan's
      # law restatement; the explicit form is more readable than the
      # distributed one).
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        - -QF1001
    gosec:
      excludes:
        # G104: Errors unhandled — duplicates errcheck. Keep the dedicated
        # linter (with project-specific exclude-functions) as the source of
        # truth so we don't maintain two parallel exclude lists.
        - G104
        # G204/G702: Subprocess launched with / command injection via variable —
        # intentional. This is a build runner that wraps git, gpg, apt-get, pip,
        # and reprepro. All command arguments come from operator-controlled
        # manifest files, not external user input.
        - G204
        - G702
        # G301: Directory permissions 0755 — standard for build output
        # directories that must be readable by other processes.
        - G301
        # G302: OpenFile permissions 0644 — same justification as G306. Build
        # artifacts and manifests are public-by-design.
        - G302
        # G304: File inclusion via variable — intentional. All file paths come
        # from operator-controlled config and manifest files.
        - G304
        # G306: WriteFile permissions 0644 — build artifacts and manifest files
        # are public by design; 0644 is the correct mode.
        - G306
        # G703: Path traversal via taint analysis — false positive on
        # os.TempFile().Name() which is controlled by the OS temp directory.
        - G703

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
